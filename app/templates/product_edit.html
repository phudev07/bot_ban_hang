{% extends "base.html" %}
{% block content %}
<section class="panel form-panel narrow"><div class="panel-head"><div><span>PRODUCT #{{ product.id }}</span><h2>Thông tin sản phẩm</h2></div><a href="/admin/products">← Danh sách</a></div>
<form method="post" class="form-grid cols-2"><input type="hidden" name="csrf" value="{{ csrf_token }}">
<label>Gian hàng<select name="category_id">{% for category in categories %}<option value="{{ category.id }}" {{ 'selected' if category.id == product.category_id else '' }}>{{ category.name_vi }}</option>{% endfor %}</select></label>
<input type="hidden" name="product_type" value="account"><label>Loại sản phẩm<input value="Tài khoản" disabled></label>
<label>Nguồn hàng<select name="fulfillment_source"><option value="local" {{ 'selected' if product.fulfillment_source == 'local' else '' }}>Kho của bot</option><option value="sumistore" {{ 'selected' if product.fulfillment_source == 'sumistore' else '' }}>Sumistore API</option></select></label>
<label>ID sản phẩm nguồn<input name="supplier_product_id" value="{{ product.supplier_product_id or '' }}" placeholder="SP-GEF55PBV"></label>
<label>Tên sản phẩm<input name="name_vi" value="{{ product.name_vi }}" required></label><label>Tên tiếng Anh<input name="name_en" value="{{ product.name_en }}"></label>
<label>Giá bán hiện tại<input name="price" value="{{ product.price }}" required><small>{% if product.fulfillment_source == 'sumistore' %}Được cập nhật động từ giá vốn nguồn + phần lợi nhuận bên cạnh.{% endif %}</small></label><label>Lợi nhuận cộng trên giá API<input name="supplier_markup" value="{{ product.supplier_markup }}" inputmode="numeric"><small>{% if product.fulfillment_source == 'sumistore' %}Giá vốn hiện tại {{ (product.supplier_price or 0)|vnd }} · bán dự kiến {{ ((product.supplier_price or 0) + product.supplier_markup)|vnd }}.{% endif %}</small></label>
<label>Số lượng tối đa<input type="number" name="max_quantity" value="{{ product.max_quantity }}" min="1" max="100"></label><label>Tồn nguồn hiện tại<input value="{{ product.external_stock if product.fulfillment_source == 'sumistore' else 'Dùng trang Nhập kho' }}" disabled></label>
<label class="wide">Mô tả<textarea name="description_vi" rows="4">{{ product.description_vi }}</textarea></label><label class="wide">Mô tả tiếng Anh<textarea name="description_en" rows="4">{{ product.description_en }}</textarea></label>
<label class="check"><input type="checkbox" name="allow_quantity" value="1" {{ 'checked' if product.allow_quantity else '' }}><span>Cho phép mua nhiều</span></label><label class="check"><input type="checkbox" name="active" value="1" {{ 'checked' if product.active else '' }}><span>Đang hiển thị</span></label>
<button class="button primary" type="submit">Lưu thay đổi</button><a class="button quiet" href="/admin/discounts?product_id={{ product.id }}">Mã giảm giá của sản phẩm</a></form>
<div class="danger-zone"><div><strong>Xóa sản phẩm</strong><p>Kho chưa bán cũng sẽ bị xóa. Sản phẩm đã có đơn hoặc thanh toán chỉ có thể ẩn.</p></div><form method="post" action="/admin/products/{{ product.id }}/delete" onsubmit="return confirm('Bạn chắc chắn muốn xóa sản phẩm này?')"><input type="hidden" name="csrf" value="{{ csrf_token }}"><button class="button danger" type="submit">Xóa sản phẩm</button></form></div>
</section>
{% endblock %}
